spring:
  application:
    name: ziro-backend

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:ziro}
    username: ${DB_USER:ziro}
    password: ${DB_PASSWORD:ziro}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate # schema e responsabilidade do Liquibase, nunca do Hibernate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
    show-sql: false

  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.xml
    enabled: true

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

server:
  port: ${SERVER_PORT:8080}

ziro:
  jwt:
    secret: ${JWT_SECRET:troque-essa-chave-em-producao-para-uma-bem-mais-longa-e-aleatoria}
    access-token-expiracao-minutos: ${JWT_ACCESS_EXP_MIN:15}
    refresh-token-expiracao-dias: ${JWT_REFRESH_EXP_DIAS:7}
  frontend-url: ${FRONTEND_URL:http://localhost,http://localhost:5173}

logging:
  level:
    com.ziro: ${LOG_LEVEL:INFO}
